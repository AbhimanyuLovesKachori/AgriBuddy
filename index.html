<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AgriBuddy AR | Final Build</title>

  <script src="https://cdn.8thwall.org/web/aframe/8frame-1.4.1.min.js"></script>
  <script src="https://cdn.8thwall.org/web/xrextras/xrextras.js"></script>
  <script src="https://cdn.8thwall.org/web/xr-engine/xr-engine.js"></script>

  <style>
    body { margin: 0; background-color: #000; color: #39FF14; font-family: monospace; overflow: hidden; }
    
    #overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 2000; display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
    }

    .neon-panel {
      pointer-events: auto; background: rgba(0, 0, 0, 0.9);
      border: 2px solid #39FF14; padding: 15px; border-radius: 12px;
      width: 260px; box-shadow: 0 0 20px #39FF14;
    }

    #agribuddy-dashboard {
      position: absolute; top: 20px; left: 20px; z-index: 1001;
      pointer-events: none; display: none;
    }

    .btn {
      background: #39FF14; color: #000; border: none; padding: 15px 30px;
      font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px;
    }
  </style>

  <script>
    AFRAME.registerComponent('agribuddy-logic', {
      init: function() {
        this.plants = [];
        this.lastPos = null;

        this.el.addEventListener('click', (e) => {
          if (this.plants.length >= 10) return;
          const point = e.detail.intersection.point;

          const wheat = document.createElement('a-entity');
          wheat.setAttribute('gltf-model', '#wheatModel');
          wheat.setAttribute('position', point);
          wheat.setAttribute('scale', '0.3 0.3 0.3');
          this.el.sceneEl.appendChild(wheat);

          this.plants.push(point);
          let txt = `Plant ${this.plants.length}/10`;
          if (this.lastPos) {
            const d = Math.sqrt(Math.pow(point.x - this.lastPos.x, 2) + Math.pow(point.z - this.lastPos.z, 2));
            txt += ` | Gap: ${d.toFixed(2)}m`;
          }
          document.getElementById('status').innerHTML = txt;
          this.lastPos = point;
        });
      }
    });

    function startSystem() {
      document.getElementById('overlay').style.display = 'none';
      document.getElementById('agribuddy-dashboard').style.display = 'block';
    }
  </script>
</head>

<body>
  <div id="overlay">
    <h2 style="letter-spacing: 3px;">AGRIBUDDY SYSTEM</h2>
    <p style="font-size: 0.8em;">Agricultural Row Planner v1.0</p>
    <button class="btn" onclick="startSystem()">INITIALIZE AR</button>
  </div>

  <div id="agribuddy-dashboard">
    <div class="neon-panel">
      <div style="font-weight: bold; font-size: 1.1em;">FIELD ANALYSIS</div>
      <div id="status" style="margin-top: 8px;">Scanning ground...</div>
      <button onclick="location.reload()" style="background:none; border:1px solid #39FF14; color:#39FF14; margin-top:10px; width:100%; border-radius:4px; font-size: 0.7em;">RE-CALIBRATE</button>
    </div>
  </div>

  <a-scene
    xr-engine="allowedDevices: any; dataPreloadChunks: slam"
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true">

    <a-assets>
      <a-asset-item id="wheatModel" src="Wheat.glb"></a-asset-item>
    </a-assets>

    <a-camera id="camera" position="0 8 0" raycaster="objects: .ground" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

    <a-entity class="ground" geometry="primitive: plane; width: 1000; height: 1000" rotation="-90 0 0" material="transparent: true; opacity: 0" agribuddy-logic></a-entity>

    <a-light type="ambient" intensity="0.8"></a-light>
  </a-scene>
</body>
</html>
